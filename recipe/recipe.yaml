schema_version: 1

context:
  version: "1.14.0"

package:
  name: rkcommon
  version: ${{ version }}

source:
  url: https://github.com/RenderKit/rkcommon/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5aef75afc8d4fccf9e70df4cbdf29a1b28b39ee51b5588b94b83a14c6a166d83

build:
  number: 0

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - tbb-devel
  run_exports:
    - ${{ pin_subpackage("rkcommon", upper_bound="x") }}

tests:
  - package_contents:
      lib:
        - rkcommon

about:
  homepage: https://github.com/RenderKit/rkcommon
  repository: https://github.com/RenderKit/rkcommon
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: "Intel RenderKit common C++/CMake infrastructure"
  description: |
    This project represents a common set of C++ infrastructure and CMake utilities
    used by various components of Intel® Rendering Toolkit (Render Kit).

extra:
  recipe-maintainers:
    - eunos-1128
